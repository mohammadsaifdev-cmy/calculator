<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basic Calculator</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <div class="calculator">
        <input type="text" id="result" readonly>

        <div class="button">
            <button class="clear">C</button>
            <button class="operator">/</button>
            <button class="operator">*</button>
            <button class="operator">-</button>
            <button class="nummber">7</button>
            <button class="nummber">8</button>
            <button class="nummber">9</button>
            <button class="operator">+</button>
            <button class="number">4</button>
            <button class="number">5</button>
            <button class="number">6</button>
            <button class="equal">=</button>
            <button class="nummber">1</button>
            <button class="nummber">2</button>
            <button class="nummber">3</button>
            <button class="nummber">0</button>
            <button class="decimal">.</button>
            <button class="cancle">Del</button>
        </div>

    </div>
    <script src="index.js"></script>
</body>
</html>
